sonar.projectKey=learn-jenkins-app
sonar.projectName=Learn Jenkins App
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Exclusions
sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/playwright-report/**,**/jest-results/**

# Coverage report (generated by Jest --coverage --coverageReporters=lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Unit test results (generated by jest-junit)
sonar.testExecutionReportPaths=jest-results/junit.xml

sonar.sourceEncoding=UTF-8
